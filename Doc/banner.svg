<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#04060f"/>
      <stop offset="50%"  stop-color="#090d1e"/>
      <stop offset="100%" stop-color="#04060f"/>
    </linearGradient>

    <!-- Title text gradient (ED amber/orange) -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffb347"/>
      <stop offset="50%"  stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#e05c00"/>
    </linearGradient>

    <!-- Cyan accent glow -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Hex icon glow filter -->
    <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" y="0" fill="#ffffff" fill-opacity="0.018"/>
    </pattern>

    <!-- Star field pattern -->
    <pattern id="stars" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <circle cx="12"  cy="18"  r="0.6" fill="#ffffff" fill-opacity="0.6"/>
      <circle cx="47"  cy="5"   r="0.4" fill="#ffffff" fill-opacity="0.5"/>
      <circle cx="83"  cy="32"  r="0.7" fill="#aed6f1" fill-opacity="0.55"/>
      <circle cx="110" cy="9"   r="0.5" fill="#ffffff" fill-opacity="0.4"/>
      <circle cx="130" cy="48"  r="0.4" fill="#ffffff" fill-opacity="0.6"/>
      <circle cx="64"  cy="61"  r="0.6" fill="#ffffff" fill-opacity="0.45"/>
      <circle cx="22"  cy="78"  r="0.4" fill="#aed6f1" fill-opacity="0.5"/>
      <circle cx="97"  cy="72"  r="0.5" fill="#ffffff" fill-opacity="0.6"/>
      <circle cx="143" cy="85"  r="0.6" fill="#ffffff" fill-opacity="0.4"/>
      <circle cx="35"  cy="110" r="0.5" fill="#ffffff" fill-opacity="0.55"/>
      <circle cx="72"  cy="128" r="0.7" fill="#aed6f1" fill-opacity="0.5"/>
      <circle cx="118" cy="113" r="0.4" fill="#ffffff" fill-opacity="0.6"/>
      <circle cx="8"   cy="142" r="0.5" fill="#ffffff" fill-opacity="0.45"/>
      <circle cx="55"  cy="145" r="0.4" fill="#ffffff" fill-opacity="0.5"/>
      <circle cx="138" cy="137" r="0.6" fill="#ffffff" fill-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="200" fill="url(#bgGrad)"/>
  <rect width="900" height="200" fill="url(#stars)"/>
  <rect width="900" height="200" fill="url(#scanlines)"/>

  <!-- Subtle ambient glow behind icon zone -->
  <ellipse cx="100" cy="100" rx="95" ry="80" fill="#1a3a5c" fill-opacity="0.18"/>

  <!-- OUTER BORDER -->
  <!-- Corner tick marks (HUD style) -->
  <line x1="0"   y1="0"   x2="30"  y2="0"   stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="0"   y1="0"   x2="0"   y2="30"  stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="900" y1="0"   x2="870" y2="0"   stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="900" y1="0"   x2="900" y2="30"  stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="0"   y1="200" x2="30"  y2="200" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="0"   y1="200" x2="0"   y2="170" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="900" y1="200" x2="870" y2="200" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="900" y1="200" x2="900" y2="170" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Full border frame (faint) -->
  <rect x="1" y="1" width="898" height="198" fill="none"
        stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.25"
        rx="2" ry="2"/>

  <!-- Top cyan accent line -->
  <line x1="30" y1="1" x2="870" y2="1" stroke="url(#cyanGrad)" stroke-width="1.2"/>
  <!-- Bottom cyan accent line -->
  <line x1="30" y1="199" x2="870" y2="199" stroke="url(#cyanGrad)" stroke-width="1.2"/>

  <!-- HEX ICON - left side, centered at (100,100) -->
  <!-- Custom hexagonal compass-rose / HUD reticle.                -->
  <!-- Geometry: flat-top hexagon, R=72px, center (100,100).        -->
  <!-- All paths are original geometry - no Frontier assets.        -->

  <!-- Outer hex ring (flat-top, R=72) -->
  <!-- Vertices: (172,100),(136,162.4),(64,162.4),(28,100),(64,37.6),(136,37.6) -->
  <polygon points="172,100 136,162.4 64,162.4 28,100 64,37.6 136,37.6"
           fill="none" stroke="#00d4ff" stroke-width="1.4" stroke-opacity="0.55"
           filter="url(#glowCyan)"/>

  <!-- Mid hex ring (R=54) -->
  <polygon points="154,100 127,146.8 73,146.8 46,100 73,53.2 127,53.2"
           fill="none" stroke="#ff8c00" stroke-width="1.0" stroke-opacity="0.45"/>

  <!-- Inner hex ring (R=36) -->
  <polygon points="136,100 118,131.2 82,131.2 64,100 82,68.8 118,68.8"
           fill="none" stroke="#00d4ff" stroke-width="0.9" stroke-opacity="0.5"/>

  <!-- Radial spokes: outer vertices to center (6 spokes) -->
  <line x1="100" y1="100" x2="172" y2="100"   stroke="#ff8c00" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="100" y1="100" x2="136" y2="162.4" stroke="#ff8c00" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="100" y1="100" x2="64"  y2="162.4" stroke="#ff8c00" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="100" y1="100" x2="28"  y2="100"   stroke="#ff8c00" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="100" y1="100" x2="64"  y2="37.6"  stroke="#ff8c00" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="100" y1="100" x2="136" y2="37.6"  stroke="#ff8c00" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Cardinal tick marks on outer hex edges (N/S/E/W highlights) -->
  <line x1="100" y1="22"  x2="100" y2="38"
        stroke="#ff8c00" stroke-width="2.2" stroke-opacity="0.9"
        filter="url(#glowOrange)"/>
  <line x1="100" y1="162" x2="100" y2="178"
        stroke="#ff8c00" stroke-width="2.2" stroke-opacity="0.9"
        filter="url(#glowOrange)"/>
  <line x1="14"  y1="100" x2="30"  y2="100"
        stroke="#ff8c00" stroke-width="2.2" stroke-opacity="0.9"
        filter="url(#glowOrange)"/>
  <line x1="170" y1="100" x2="186" y2="100"
        stroke="#ff8c00" stroke-width="2.2" stroke-opacity="0.9"
        filter="url(#glowOrange)"/>

  <!-- Diamond reticle in center -->
  <polygon points="100,72 128,100 100,128 72,100"
           fill="#ff8c00" fill-opacity="0.07"
           stroke="#ff8c00" stroke-width="1.6" stroke-opacity="0.85"
           filter="url(#glowOrange)"/>
  <!-- Inner diamond cross-hair lines -->
  <line x1="100" y1="72"  x2="100" y2="128" stroke="#ff8c00" stroke-width="0.7" stroke-opacity="0.6"/>
  <line x1="72"  y1="100" x2="128" y2="100" stroke="#ff8c00" stroke-width="0.7" stroke-opacity="0.6"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="4"
          fill="#ff8c00" fill-opacity="0.9"
          filter="url(#glowOrange)"/>
  <circle cx="100" cy="100" r="2" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Arc segments (top-right and bottom-left accents) -->
  <path d="M 136,37.6 A 72,72 0 0 1 172,100"
        fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.7"
        filter="url(#glowCyan)"/>
  <path d="M 28,100 A 72,72 0 0 1 64,162.4"
        fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.7"
        filter="url(#glowCyan)"/>

  <!-- SEPARATOR LINE -->
  <line x1="195" y1="20" x2="195" y2="180"
        stroke="#ff8c00" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- TEXT BLOCK -->

  <!-- "ELITE DANGEROUS" - main title -->
  <text x="550" y="88"
        font-family="'Courier New', Courier, monospace"
        font-size="38"
        font-weight="bold"
        letter-spacing="6"
        text-anchor="middle"
        fill="url(#titleGrad)"
        filter="url(#textGlow)">ELITE DANGEROUS</text>

  <!-- "COCKPIT" - secondary title, cyan -->
  <text x="550" y="130"
        font-family="'Courier New', Courier, monospace"
        font-size="28"
        font-weight="bold"
        letter-spacing="14"
        text-anchor="middle"
        fill="#00d4ff"
        filter="url(#subtleGlow)">COCKPIT</text>

  <!-- Thin separator under "ELITE DANGEROUS" -->
  <line x1="215" y1="100" x2="885" y2="100"
        stroke="#ff8c00" stroke-width="0.5" stroke-opacity="0.35"/>

  <!-- Subtitle tag line -->
  <text x="550" y="162"
        font-family="'Courier New', Courier, monospace"
        font-size="11"
        letter-spacing="3"
        text-anchor="middle"
        fill="#7ec8e3"
        fill-opacity="0.75">Commander's AI Companion  -  Real-time Journal &amp; Status</text>

  <!-- Version tag micro text top-right -->
  <text x="882" y="22"
        font-family="'Courier New', Courier, monospace"
        font-size="9"
        letter-spacing="1"
        text-anchor="end"
        fill="#00d4ff"
        fill-opacity="0.5">ED COCKPIT v1.0</text>

  <!-- Bottom-left callsign -->
  <text x="18" y="188"
        font-family="'Courier New', Courier, monospace"
        font-size="9"
        letter-spacing="2"
        text-anchor="start"
        fill="#ff8c00"
        fill-opacity="0.5">* CMDR INTERFACE</text>

</svg>
